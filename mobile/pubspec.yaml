name: constructpulse
description: "ConstructPulse - Construction Workforce Intelligence & Site Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: 5.10.0
  retrofit: ^4.4.1

  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.3

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  lottie: ^3.5.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  freezed_annotation: ^3.1.0
  equatable: ^2.1.0
  dartz: ^0.10.1

  # File Handling
  path_provider: ^2.1.6
  open_filex: ^4.5.0

  # Permissions
  permission_handler: ^12.0.2

  # Connectivity
  connectivity_plus: ^6.1.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_phosphor_icons: ^0.0.1+6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.1
  json_serializable: ^6.8.0
  freezed: ^3.2.6-dev.1
  retrofit_generator: ^10.2.7
  riverpod_generator: ^4.0.4
  mockito: ^5.4.4
  firebase_core_platform_interface: ^6.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/


