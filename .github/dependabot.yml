version: 2

updates:
  # Backend - Python
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Flutter / Dart
  - package-ecosystem: "pub"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions (optional but recommended)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
